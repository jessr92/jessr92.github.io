<!DOCTYPE html>

  <body>
    <header>Jessica Reid<img src="/images/progress_pride_flag.png" alt="Progress Pride Flag"></header>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/projects">Coding</a></li>
        <li><a href="/interests">Interests</a></li>

    </nav>
    <main>
      <h3>Baking</h3>
      <p>I like to bake. Content TBD</p>
      <p>Here are some of the things I have baked.</p>
      <section class="image-gallery" aria-label="Image gallery" style="--slide-count: 3">
        <input class="gallery-radio" type="radio" name="gallery-group" value="0" id="gallery-radio-0" checked>
        <input class="gallery-radio" type="radio" name="gallery-group" value="1" id="gallery-radio-1">
        <input class="gallery-radio" type="radio" name="gallery-group" value="2" id="gallery-radio-2">
        <div class="gallery-viewport">
          <div class="gallery-track">
            <div class="gallery-slide"><span class="counter">1 / 3</span>
              <button class="lightbox-corner" type="button" popovertarget="gallery-lightbox-0" title="View fullscreen" aria-label="View fullscreen">⤡</button>
              <label class="gallery-nav gallery-prev" for="gallery-radio-2">&#10094;</label>
              <label class="gallery-nav gallery-next" for="gallery-radio-1">&#10095;</label>
              <button class="lightbox-open" type="button" popovertarget="gallery-lightbox-0" aria-label="View fullscreen: Cheesecake"><img class="slide" src="/images/cheesecake.jpg" alt="Cheesecake" loading="lazy"></button>
              <p class="gallery-caption">Cheesecake</p>
            </div>
            <div class="gallery-slide"><span class="counter">2 / 3</span>
              <button class="lightbox-corner" type="button" popovertarget="gallery-lightbox-1" title="View fullscreen" aria-label="View fullscreen">⤡</button>
              <label class="gallery-nav gallery-prev" for="gallery-radio-0">&#10094;</label>
              <label class="gallery-nav gallery-next" for="gallery-radio-2">&#10095;</label>
              <button class="lightbox-open" type="button" popovertarget="gallery-lightbox-1" aria-label="View fullscreen: Chocolate Chip Cookies"><img class="slide" src="/images/cookies.jpg" alt="Chocolate Chip Cookies" loading="lazy"></button>
              <p class="gallery-caption">Chocolate Chip Cookies</p>
            </div>
            <div class="gallery-slide"><span class="counter">3 / 3</span>
              <button class="lightbox-corner" type="button" popovertarget="gallery-lightbox-2" title="View fullscreen" aria-label="View fullscreen">⤡</button>
              <label class="gallery-nav gallery-prev" for="gallery-radio-1">&#10094;</label>
              <label class="gallery-nav gallery-next" for="gallery-radio-0">&#10095;</label>
              <button class="lightbox-open" type="button" popovertarget="gallery-lightbox-2" aria-label="View fullscreen: Chocolate and Raspberry Muffins"><img class="slide" src="/images/chocolate_raspberry_muffins.jpg" alt="Chocolate and Raspberry Muffins" loading="lazy"></button>
              <p class="gallery-caption">Chocolate and Raspberry Muffins</p>
            </div>
          </div>
        </div>
        <div class="gallery-thumbnails">
          <label class="thumbnail-link" for="gallery-radio-0"><img class="thumbnail" src="/images/cheesecake_thumb.jpg" alt="Cheesecake" loading="lazy"></label>
          <label class="thumbnail-link" for="gallery-radio-1"><img class="thumbnail" src="/images/cookies_thumb.jpg" alt="Chocolate Chip Cookies" loading="lazy"></label>
          <label class="thumbnail-link" for="gallery-radio-2"><img class="thumbnail" src="/images/chocolate_raspberry_muffins.jpg" alt="Chocolate and Raspberry Muffins" loading="lazy"></label>
        </div>
        <div class="gallery-lightbox" id="gallery-lightbox-0" popover>
          <div class="lightbox-panel">
            <button class="lightbox-close" type="button" popovertarget="gallery-lightbox-0" popovertargetaction="hide" aria-label="Close fullscreen">×</button><img class="lightbox-img" src="/images/cheesecake.jpg" alt="Cheesecake" loading="lazy">
            <p class="lightbox-caption">Cheesecake</p>
          </div>
        </div>
        <div class="gallery-lightbox" id="gallery-lightbox-1" popover>
          <div class="lightbox-panel">
            <button class="lightbox-close" type="button" popovertarget="gallery-lightbox-1" popovertargetaction="hide" aria-label="Close fullscreen">×</button><img class="lightbox-img" src="/images/cookies.jpg" alt="Chocolate Chip Cookies" loading="lazy">
            <p class="lightbox-caption">Chocolate Chip Cookies</p>
          </div>
        </div>
        <div class="gallery-lightbox" id="gallery-lightbox-2" popover>
          <div class="lightbox-panel">
            <button class="lightbox-close" type="button" popovertarget="gallery-lightbox-2" popovertargetaction="hide" aria-label="Close fullscreen">×</button><img class="lightbox-img" src="/images/chocolate_raspberry_muffins.jpg" alt="Chocolate and Raspberry Muffins" loading="lazy">
            <p class="lightbox-caption">Chocolate and Raspberry Muffins</p>
          </div>
        </div>
      </section>
